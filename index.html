<!DOCTYPE html>
<html>
<head>
    <title>Date?</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            background-color: #ffe6f0;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #yes {
            background-color: #ff4d88;
            color: white;
        }

        #no {
            background-color: gray;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>Selina, gehst du auf ein Date mit mir?</h1>

    <button id="yes">Ja</button>
    <button id="no">Nein</button>

    <script>
        const noBtn = document.getElementById("no");
        const yesBtn = document.getElementById("yes");

        function moveButton() {
            noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
        }

        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("mousemove", moveButton);

        yesBtn.addEventListener("click", () => {
            document.body.innerHTML = "<h1>Ich freu mich!</h1>";
        });
    </script>

</body>
</html>
